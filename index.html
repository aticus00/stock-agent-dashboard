<script>
const data = JSON.parse(document.getElementById('dashboard-data').textContent);
 
function fmtPct(v) {
  if (v === null || v === undefined) return '-';
  const sign = v > 0 ? '+' : '';
  return sign + v.toFixed(2) + '%';
}
function fmtNum(v) {
  if (v === null || v === undefined) return '-';
  return v.toLocaleString();
}
function colorClass(v) {
  if (v === null || v === undefined) return '';
  return v > 0 ? 'up' : (v < 0 ? 'down' : '');
}
 
document.getElementById('headline').textContent = data.trade_date + ' 시장 리포트';
document.getElementById('subtext').textContent =
  `관측 ${data.prices.length}종목 · 이슈 ${data.total_events}건 · 섹터 ${data.sectors.length}개 추적 · 신호 ${data.signals.length}건`;
document.getElementById('generated-at').textContent = data.generated_at;
document.getElementById('headline-box').textContent = data.headline || '';
 
const s = data.stats;
document.getElementById('stat-row').innerHTML = `
  <div class="stat-card"><div class="label">상승</div><div class="value up">${s.up_count}</div></div>
  <div class="stat-card"><div class="label">하락</div><div class="value down">${s.down_count}</div></div>
  <div class="stat-card"><div class="label">보합</div><div class="value">${s.flat_count}</div></div>
  <div class="stat-card"><div class="label">외국인 순매수</div><div class="value mono ${colorClass(s.total_foreign)}">${fmtNum(s.total_foreign)}</div></div>
  <div class="stat-card"><div class="label">기관 순매수</div><div class="value mono ${colorClass(s.total_inst)}">${fmtNum(s.total_inst)}</div></div>
`;
 
const maxAbs = Math.max(1, ...data.sectors.map(sec => Math.abs(sec.avg_change_rate)));
document.getElementById('sector-chart').innerHTML = data.sectors.map(sec => {
  const pct = Math.min(100, (Math.abs(sec.avg_change_rate) / maxAbs) * 50);
  const isUp = sec.avg_change_rate >= 0;
  const barStyle = isUp
    ? `left:50%; width:${pct}%; background:var(--up);`
    : `right:50%; width:${pct}%; background:var(--down);`;
  return `
    <div class="diverge-row">
      <div class="diverge-name">${sec.sector}</div>
      <div class="diverge-track"><div class="diverge-center"></div><div class="diverge-bar" style="${barStyle}"></div></div>
      <div class="diverge-value ${colorClass(sec.avg_change_rate)} mono">${fmtPct(sec.avg_change_rate)}</div>
    </div>`;
}).join('');
 
function renderPriceTable(selector, rows) {
  document.querySelector(selector).innerHTML = rows.map(p => `
    <tr>
      <td class="mono">${p.stock_code}</td>
      <td>${p.stock_name || '-'}</td>
      <td class="num mono">${fmtNum(p.close_price)}</td>
      <td class="num mono ${colorClass(p.change_rate)}">${fmtPct(p.change_rate)}</td>
      <td class="num mono ${colorClass(p.foreign_net_buy)}">${fmtNum(p.foreign_net_buy)}</td>
      <td class="num mono ${colorClass(p.inst_net_buy)}">${fmtNum(p.inst_net_buy)}</td>
    </tr>
  `).join('');
}
renderPriceTable('#price-table-kospi tbody', data.prices_kospi);
renderPriceTable('#price-table-kosdaq tbody', data.prices_kosdaq);

const signalsTbody = document.querySelector('#signals-table tbody');
signalsTbody.innerHTML = data.signals.map(sig => {
  const newsCell = sig.top_news
    ? (sig.top_news_url
        ? `<a href="${sig.top_news_url}" target="_blank" rel="noopener">${sig.top_news} ↗</a>`
        : sig.top_news)
    : '관련 뉴스 없음';
  return `
  <tr>
    <td class="mono">${sig.display_time || '-'}</td>
    <td class="mono ${sig.action === 'BUY' ? 'up' : (sig.action === 'SELL' ? 'down' : '')}">${sig.action}</td>
    <td class="mono">${sig.stock_code}</td>
    <td>${sig.stock_name || '-'}</td>
    <td class="num mono">${fmtNum(sig.price)}</td>
    <td style="color:var(--muted); font-size:13px;">${newsCell}</td>
  </tr>`;
}).join('') || '<tr><td colspan="6" style="color:var(--muted)">오늘 생성된 신호가 없습니다.</td></tr>';

document.getElementById('issue-tags').innerHTML = data.categories.map(cat => `
  <div class="tag" onclick="this.classList.toggle('open')">
    <div class="tag-head">${cat.name} <span class="count">${cat.count}</span><span class="caret">▶</span></div>
    <div class="tag-detail">
      ${cat.items.map(it => {
        const label = `${it.stock_name ? `<span class="code mono">${it.stock_name}</span>` : ''}${it.title}`;
        return it.source_url
          ? `<div class="tag-detail-item"><a href="${it.source_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${label} ↗</a></div>`
          : `<div class="tag-detail-item">${label}</div>`;
      }).join('')}
    </div>
  </div>
`).join('') || '<span style="color:var(--muted)">분류된 이슈 없음</span>';
</script>
